services:
  # ── Frontend Static Site ──────────────────────────────────────────────────
  - type: web
    name: taskflow-ai-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDirectory: client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taskflow-ai-backend
          property: host

  # ── Backend Web Service ───────────────────────────────────────────────────
  - type: web
    name: taskflow-ai-backend
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    rootDirectory: server
    disk:
      name: uploads-disk
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false  # ← Set your Gemini API key in the Render dashboard
      - key: GENAI_API_KEY
        sync: false  # ← Alias — set same value as GEMINI_API_KEY
      - key: NODE_ENV
        value: production

# ── Managed PostgreSQL ────────────────────────────────────────────────────
databases:
  - name: taskflow-ai-db
    plan: free
